<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Позиція мінімального елемента</title>
    <style>
      body {
        font-family: monospace;
        background: #0d1117;
        color: #c9d1d9;
        padding: 20px;
        max-width: 700px;
        margin: 0 auto;
      }
      textarea,
      input {
        background: #161b22;
        color: #c9d1d9;
        border: 1px solid #30363d;
        padding: 10px;
        font-family: monospace;
        width: 100%;
        box-sizing: border-box;
        margin: 8px 0;
      }
      button {
        background: #238636;
        color: white;
        border: none;
        padding: 10px 20px;
        cursor: pointer;
        margin: 10px 0;
      }
      button:hover {
        background: #2ea043;
      }
      #result {
        font-size: 1.3em;
        margin-top: 20px;
        padding: 12px;
        background: #1f2937;
        border-left: 4px solid #238636;
      }
      .info {
        color: #8b949e;
        font-size: 0.9em;
        margin: 15px 0;
      }
    </style>
  </head>
  <body>
    <h2>Знайти позицію артефактного телефона</h2>
    <p class="info">
      Введіть вагу телефонів через пробіл (або по одному в стовпчик).<br />
      Якщо мінімальне число зустрічається кілька разів → виводимо 0<br />
      Якщо тільки один раз → виводимо його позицію (починаючи з 1)
    </p>

    <textarea
      id="numbers"
      rows="6"
      placeholder="наприклад: 5 1 8 3 1 7 9"
    ></textarea>

    <button onclick="findMinPosition()">Знайти</button>

    <div id="result"></div>

    <script>
      function findMinPosition() {
        const input = document.getElementById("numbers").value.trim();
        const resultDiv = document.getElementById("result");

        if (!input) {
          resultDiv.textContent = "0";
          return;
        }

        const arr = input
          .split(/\s+/)
          .map((n) => n.trim())
          .filter((n) => n !== "")
          .map(Number);

        if (arr.length === 0 || arr.some(isNaN)) {
          resultDiv.textContent = "Помилка: введи лише числа";
          return;
        }

        let min = arr[0];
        let pos = 1;
        let duplicates = 1;

        for (let i = 1; i < arr.length; i++) {
          const num = arr[i];
          if (num < min) {
            min = num;
            pos = i + 1;
            duplicates = 1;
          } else if (num === min) {
            duplicates++;
          }
        }

        if (duplicates === 1) {
          resultDiv.textContent = pos;
        } else {
          resultDiv.textContent = "0";
        }
      }
    </script>
  </body>
</html>
